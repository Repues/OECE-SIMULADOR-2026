<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Alumno | OECE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

    <!-- Firebase Compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    
    <style>
        :root {
            --osce-blue: #002C6C;
            --osce-red: #D91023;
            --bg-light: #F8FAFC;
            --text-main: #1D2129;
            --text-muted: #64748B;
            --white: #FFFFFF;
            --border: #E2E8F0;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Inter', sans-serif;
            background-color: var(--white);
            color: var(--text-main);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #neural-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .login-card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(0, 44, 108, 0.1);
            margin: 20px;
        }

        .brand-header { text-align: center; margin-bottom: 32px; }
        .brand-header a { font-weight: 700; color: var(--osce-blue); text-decoration: none; font-size: 1.8rem; }

        h1 {
            font-family: 'Instrument Serif', serif;
            font-size: 2.2rem;
            color: var(--osce-blue);
            margin: 16px 0 8px;
            line-height: 1.1;
        }

        .subtitle { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 30px; }

        .form-group { margin-bottom: 20px; text-align: left; }

        label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 8px; color: var(--osce-blue); }

        input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--bg-light);
            font-family: inherit;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--osce-blue);
            background: var(--white);
            box-shadow: 0 0 0 4px rgba(0, 44, 108, 0.05);
        }

        .btn-login {
            width: 100%;
            background: var(--osce-blue);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }

        .btn-login:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .error-msg {
            background: #fff1f2;
            border: 1px solid #fecaca;
            color: var(--osce-red);
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-top: 15px;
            display: none;
        }

        .footer-links { margin-top: 30px; text-align: center; font-size: 0.9rem; color: var(--text-muted); }
        .footer-links a { color: var(--osce-red); text-decoration: none; font-weight: 600; }

        .back-home {
            position: absolute;
            top: 20px; left: 20px;
            z-index: 100;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        @media (max-width: 480px) { .login-card { padding: 30px 24px; } }
    </style>
</head>
<body>
    <a href="index.html" class="back-home">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        Volver al inicio
    </a>

    <canvas id="neural-canvas"></canvas>

    <div class="login-card">
        <div class="brand-header">
            <a href="index.html">OECE.</a>
            <h1>Portal del Alumno</h1>
            <p class="subtitle">Ingresa para continuar tu preparación técnica.</p>
        </div>

        <div class="form-group">
            <label for="dni">DNI / Usuario</label>
            <input type="text" id="dni" placeholder="Ej: 72458932" autocomplete="username">
        </div>
        <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
        </div>
        <button class="btn-login" id="btn-login" onclick="handleLogin()">Acceder al Sistema →</button>
        <div class="error-msg" id="error-msg"></div>

        <div class="footer-links">
            ¿No tienes acceso? <a href="https://wa.me/51964310396" target="_blank">Adquirir plan aquí</a>
        </div>
    </div>

    <script>
        // ── Firebase Init ──────────────────────────────────────────
        const firebaseConfig = {
            apiKey: "AIzaSyCKl7TB4-ALM9ZNYBQ5wXuesrQ9ms7VxaU",
            authDomain: "b1000preguntas.firebaseapp.com",
            projectId: "b1000preguntas",
            storageBucket: "b1000preguntas.firebasestorage.app",
            messagingSenderId: "754596612400",
            appId: "1:754596612400:web:7f6223075bc5c733e220f5"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // ── Neural Canvas ──────────────────────────────────────────
        const canvas = document.getElementById('neural-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const mouse = { x: null, y: null, radius: 180 };

        function initCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', initCanvas);
        window.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1;
                this.speedX = (Math.random() - 0.5) * 0.6;
                this.speedY = (Math.random() - 0.5) * 0.6;
            }
            update() {
                this.x += this.speedX; this.y += this.speedY;
                if (this.x > canvas.width || this.x < 0) this.speedX *= -1;
                if (this.y > canvas.height || this.y < 0) this.speedY *= -1;
                if (mouse.x !== null) {
                    let dx = mouse.x - this.x, dy = mouse.y - this.y;
                    if (Math.sqrt(dx*dx+dy*dy) < mouse.radius) { this.x += dx * 0.01; this.y += dy * 0.01; }
                }
            }
            draw() {
                ctx.fillStyle = 'rgba(0, 44, 108, 0.12)';
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, i) => {
                p.update(); p.draw();
                particles.slice(i+1).forEach(q => {
                    const d = Math.hypot(p.x-q.x, p.y-q.y);
                    if (d < 150) {
                        ctx.strokeStyle = `rgba(0,44,108,${0.1*(1-d/150)})`;
                        ctx.lineWidth = 0.8;
                        ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(q.x,q.y); ctx.stroke();
                    }
                });
            });
            requestAnimationFrame(animate);
        }

        initCanvas();
        for (let i = 0; i < 60; i++) particles.push(new Particle());
        animate();

        // ── Login Handler ──────────────────────────────────────────
        async function handleLogin() {
            const dni = document.getElementById('dni').value.trim();
            const pass = document.getElementById('password').value.trim();
            const btn = document.getElementById('btn-login');
            const errEl = document.getElementById('error-msg');

            errEl.style.display = 'none';
            if (!dni || !pass) { showError('Completa todos los campos.'); return; }

            btn.innerText = 'Verificando...';
            btn.disabled = true;

            // Check if admin login
            try {
                const adminSnap = await db.collection('admins').doc('admin').get();
                if (adminSnap.exists) {
                    const adminData = adminSnap.data();
                    if (dni === adminData.usuario && pass === adminData.password) {
                        sessionStorage.setItem('oece_role', 'admin');
                        window.location.href = 'admi.html';
                        return;
                    }
                }
            } catch(e) {}

            // Check alumno
            try {
                const snap = await db.collection('alumnos').where('dni', '==', dni).limit(1).get();
                if (snap.empty) { showError('DNI no encontrado. Contacta al administrador.'); return; }

                const alumnoDoc = snap.docs[0];
                const alumno = alumnoDoc.data();

                if (alumno.password !== pass) { showError('Contraseña incorrecta.'); return; }

                // Check expiry
                const now = new Date();
                const expiry = alumno.fechaVencimiento.toDate();
                if (now > expiry) { showError('Tu acceso ha vencido. Renueva tu plan.'); return; }

                // Save session
                sessionStorage.setItem('oece_role', 'alumno');
                sessionStorage.setItem('oece_uid', alumnoDoc.id);
                sessionStorage.setItem('oece_dni', dni);
                sessionStorage.setItem('oece_nombre', alumno.nombre);
                sessionStorage.setItem('oece_plan', alumno.plan);
                sessionStorage.setItem('oece_expiry', expiry.toISOString());

                window.location.href = 'alumno.html';
            } catch(err) {
                console.error(err);
                showError('Error de conexión. Intenta de nuevo.');
            }
        }

        function showError(msg) {
            const btn = document.getElementById('btn-login');
            const errEl = document.getElementById('error-msg');
            btn.innerText = 'Acceder al Sistema →';
            btn.disabled = false;
            errEl.innerText = msg;
            errEl.style.display = 'block';
        }

        // Enter key
        document.getElementById('password').addEventListener('keydown', e => {
            if (e.key === 'Enter') handleLogin();
        });
    </script>
</body>
</html>
